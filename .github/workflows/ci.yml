name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Swift package
        run: swift build

      - name: Build universal app bundle
        run: ./Scripts/build-app.sh release universal

      - name: Verify app bundle
        run: |
          test -x "dist/Stay Awake for Agent.app/Contents/MacOS/StayAwakeForAgent"
          codesign --verify --deep --strict --verbose=2 "dist/Stay Awake for Agent.app"

          ARCHS="$(lipo -archs "dist/Stay Awake for Agent.app/Contents/MacOS/StayAwakeForAgent")"
          echo "Architectures: $ARCHS"
          [[ "$ARCHS" == *"arm64"* ]]
          [[ "$ARCHS" == *"x86_64"* ]]
