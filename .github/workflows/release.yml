name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag. Leave blank to use v<CFBundleShortVersionString>."
        required: false
        type: string
      prerelease:
        description: "Mark this GitHub Release as a pre-release."
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        env:
          INPUT_TAG_NAME: ${{ github.event.inputs.tag_name || '' }}
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)"
          ARCHIVE_NAME="Stay-Awake-for-Agent-macOS-universal-$VERSION.zip"
          DMG_NAME="Stay-Awake-for-Agent-macOS-universal-$VERSION.dmg"

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            TAG_NAME="$GITHUB_REF_NAME"
          elif [[ -n "$INPUT_TAG_NAME" ]]; then
            TAG_NAME="$INPUT_TAG_NAME"
          else
            TAG_NAME="v$VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build release archive
        run: ./Scripts/package-release.sh

      - name: Generate release notes
        env:
          VERSION: ${{ steps.release.outputs.version }}
          ARCHIVE_NAME: ${{ steps.release.outputs.archive_name }}
          DMG_NAME: ${{ steps.release.outputs.dmg_name }}
        run: |
          sed \
            -e "s/{{VERSION}}/$VERSION/g" \
            -e "s/{{ARCHIVE_NAME}}/$ARCHIVE_NAME/g" \
            -e "s/{{DMG_NAME}}/$DMG_NAME/g" \
            GITHUB_RELEASE.md > dist/release/GITHUB_RELEASE.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: stay-awake-for-agent-release
          path: dist/release/*

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
          PRERELEASE: ${{ github.event.inputs.prerelease || 'false' }}
        run: |
          PRERELEASE_FLAG=()
          if [[ "$PRERELEASE" == "true" ]]; then
            PRERELEASE_FLAG=(--prerelease)
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "Stay Awake for Agent $VERSION" \
              --notes-file dist/release/GITHUB_RELEASE.md \
              "${PRERELEASE_FLAG[@]}"
          else
            gh release create "$TAG_NAME" \
              --target "$GITHUB_SHA" \
              --title "Stay Awake for Agent $VERSION" \
              --notes-file dist/release/GITHUB_RELEASE.md \
              "${PRERELEASE_FLAG[@]}"
          fi

          gh release upload "$TAG_NAME" \
            dist/release/*.dmg \
            dist/release/*.zip \
            dist/release/SHA256SUMS.txt \
            --clobber
